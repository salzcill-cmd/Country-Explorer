<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer - Countries</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-300">
    <button id="darkModeToggle" class="fixed top-4 right-4 z-50 p-2 rounded-full bg-white dark:bg-gray-800 shadow-lg hover:scale-110 transition-transform">
        <i class="fas fa-sun text-yellow-500 dark:hidden"></i>
        <i class="fas fa-moon text-blue-300 hidden dark:block"></i>
    </button>

    <button id="backToTop" class="fixed bottom-4 right-4 z-50 p-3 rounded-full bg-blue-600 text-white shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-blue-700">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div id="toastContainer" class="fixed top-4 left-4 z-50 flex flex-col gap-2"></div>

    <nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="font-heading text-xl font-bold text-blue-600 dark:text-blue-400">🌍 Country Explorer</a>
            <div class="flex gap-4">
                <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">Home</a>
                <a href="countries.html" class="text-blue-600 dark:text-blue-400 font-medium">Countries</a>
                <a href="about.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400">About</a>
            </div>
        </div>
    </nav>

    <section class="py-8">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <input type="text" id="searchInput" placeholder="Search countries..." class="flex-1 px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex flex-wrap gap-2" id="regionFilters">
                    <button class="region-btn px-4 py-2 rounded-lg bg-blue-600 text-white" data-region="All">All</button>
                    <button class="region-btn px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-colors" data-region="Africa">Africa</button>
                    <button class="region-btn px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-colors" data-region="Americas">Americas</button>
                    <button class="region-btn px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-colors" data-region="Asia">Asia</button>
                    <button class="region-btn px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-colors" data-region="Europe">Europe</button>
                    <button class="region-btn px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-colors" data-region="Oceania">Oceania</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div id="resultsInfo" class="text-gray-600 dark:text-gray-400"></div>
                <button id="exportBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                    <i class="fas fa-download mr-2"></i>Export CSV
                </button>
            </div>

            <div id="loadingState" class="hidden">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                    <div class="skeleton-card bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-md h-80"></div>
                </div>
            </div>

            <div id="errorState" class="hidden text-center py-16">
                <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
                <p class="text-xl text-gray-600 dark:text-gray-400 mb-4" id="errorMessage">Failed to load countries data.</p>
                <button id="retryBtn" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-redo mr-2"></i>Retry
                </button>
            </div>

            <div id="countriesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

            <div id="pagination" class="flex justify-center items-center gap-4 mt-12">
                <button id="prevBtn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-blue-600 hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-chevron-left mr-2"></i>Previous
                </button>
                <span id="pageInfo" class="text-gray-600 dark:text-gray-400"></span>
                <button id="nextBtn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-blue-600 hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Next<i class="fas fa-chevron-right ml-2"></i>
                </button>
            </div>
        </div>
    </section>

    <div id="detailModal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="modal-overlay absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>
        <div class="modal-content bg-white dark:bg-gray-800 rounded-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto relative z-10">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 dark:hover:text-white z-20">
                <i class="fas fa-times text-2xl"></i>
            </button>
            <div id="modalBody" class="p-6"></div>
        </div>
    </div>

    <footer class="bg-white dark:bg-gray-800 py-8 border-t dark:border-gray-700 mt-16">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-600 dark:text-gray-400">&copy; 2026 Country Explorer. All rights reserved.</p>
        </div>
    </footer>

    <script src="countries-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
